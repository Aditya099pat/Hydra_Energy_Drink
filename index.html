<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Hydra Energy</title>

    <!-- Primary SEO -->
    <meta
      name="description"
      content="Hydra Energy — bold flavour, clean kick. Get set. Caffeinate."

    <!-- Favicon (choose ONE that matches your file in /public) -->

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- If you have favicon.png instead, use this and remove the line above -->

    <!-- Open Graph / Social Preview -->
    <meta property="og:title" content="Hydra Energy" />

      property="og:description"
      content="Grab a Hydra and fight through your day with this flavourful potion of energy."

      name="twitter:description"
